<!DOCTYPE html>
<html>
<head>
    <title>Update Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

{% include 'navbar.html' %}

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-body">

            <h2 class="mb-4">
                Update Resume
            </h2>

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Upload New Resume
                    </label>

                    <input
                        type="file"
                        name="resume"
                        class="form-control">

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Update Resume

                </button>

            </form>

        </div>

    </div>

</div>

{% include 'footer.html' %}

</body>
</html>
